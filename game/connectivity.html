<!DOCTYPE html>
<html>
<head>
<title>Service Connectivity Test</title>
<style>
  body { background: #0a0f1a; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 40px; }
  h1 { color: #22d3ee; font-size: 24px; }
  .card { background: #141b2d; border: 1px solid #1e293b; border-radius: 10px; padding: 20px; margin: 16px 0; }
  .label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .value { color: #22d3ee; font-size: 18px; margin-top: 4px; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .ping-btn { background: #22d3ee; color: #0a0f1a; border: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 14px; }
  .ping-btn:hover { opacity: 0.9; }
  #log { background: #0d1117; border: 1px solid #1e293b; border-radius: 8px; padding: 16px; margin-top: 16px; max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
  .ts { color: #64748b; }
</style>
</head>
<body>
  <h1>Service Connectivity Test</h1>
  <p style="color:#64748b;">Tests the connection env var between game ↔ api services</p>

  <div class="card">
    <div class="label">API_URL (from connection env var)</div>
    <div class="value" id="apiUrl">Loading...</div>
  </div>

  <button class="ping-btn" onclick="doPing()">Ping API</button>
  <button class="ping-btn" style="background:#a855f7;margin-left:8px;" onclick="doRoundtrip()">Roundtrip (Game → API → Game)</button>

  <div id="log"></div>

  <script>
    // API_URL is injected as a regular env var by Inframan.
    // Since this is a static nginx page, we fetch it from a /env endpoint
    // that the api service exposes, or we hardcode a relative proxy.
    // For testing: the game's API_URL env points to the api service.
    // We'll call /api/ping directly — Inframan injects it as an env var
    // on the api service, and we fetch from the api's URL.

    const apiUrl = window.__API_URL || '';

    function log(msg, cls) {
      const el = document.getElementById('log');
      const ts = new Date().toISOString().slice(11, 23);
      el.innerHTML += `<div><span class="ts">[${ts}]</span> <span class="${cls || ''}">${msg}</span></div>`;
      el.scrollTop = el.scrollHeight;
    }

    async function fetchApiUrl() {
      // Try to get the API_URL from the api service's /info endpoint
      // For static nginx, we'll just show a placeholder — the real test
      // is calling the api service directly
      document.getElementById('apiUrl').textContent = 'Use the buttons below to test connectivity';
    }

    async function doPing() {
      log('→ Sending ping to API service...');
      try {
        // The API service URL is set as a connection env var on the game service.
        // Since this is a static page served by nginx, we can't read env vars directly.
        // Instead, the api service exposes /ping which we call.
        // In a real setup, you'd configure nginx to proxy /api/* to API_URL.
        // For this test, we'll try a few common patterns:
        const resp = await fetch('/api/ping');
        const data = await resp.json();
        log(`← Response: ${JSON.stringify(data)}`, 'ok');
      } catch (e) {
        log(`✗ Failed: ${e.message}`, 'err');
        log('Note: Connection env vars are resolved at deploy time. Check that API_URL is set as a connection pointing to the api service.', 'err');
      }
    }

    async function doRoundtrip() {
      log('→ Starting roundtrip: game → api → game...');
      try {
        const resp = await fetch('/api/roundtrip');
        const data = await resp.json();
        log(`← Roundtrip response: ${JSON.stringify(data, null, 2)}`, 'ok');
      } catch (e) {
        log(`✗ Roundtrip failed: ${e.message}`, 'err');
      }
    }

    fetchApiUrl();
  </script>
</body>
</html>
